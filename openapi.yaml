openapi: 3.1.0
info:
  title: App Store Connect API Gateway
  version: 0.1.0
  description: |
    Refactored REST gateway for App Store Connect API.
    Authentication uses Authorization Bearer token only.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /v1/token:
    post:
      summary: Create JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [iss, kid]
              properties:
                iss:
                  type: string
                kid:
                  type: string
                ttl:
                  type: integer
                  minimum: 60
                  maximum: 1200
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/apps:
    get:
      summary: List apps
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/apps/{id}:
    get:
      summary: Get app by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/apps/{id}/appStoreVersions:
    get:
      summary: List app store versions for an app
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/devices:
    get:
      summary: List devices
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                udid:
                  type: string
                name:
                  type: string
                platform:
                  type: string
                data:
                  type: object
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/devices/{id}:
    get:
      summary: Get device by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      summary: Update device
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Delete device
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Device deleted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/bundleIds:
    get:
      summary: List bundle ids
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create bundle id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/bundleIds/{id}:
    get:
      summary: Get bundle id by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      summary: Update bundle id
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Delete bundle id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Bundle id deleted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/certificates:
    get:
      summary: List certificates
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/certificates/{id}:
    get:
      summary: Get certificate by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Delete certificate
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Certificate deleted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/profiles:
    get:
      summary: List profiles
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/profiles/{id}:
    get:
      summary: Get profile by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Delete profile
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Profile deleted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/betaGroups:
    get:
      summary: List TestFlight beta groups
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/betaTesters:
    get:
      summary: List TestFlight beta testers
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/builds:
    get:
      summary: List TestFlight builds
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/appStoreVersions/{id}/appStoreVersionLocalizations:
    get:
      summary: List localizations by app store version id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/appStoreVersionLocalizations:
    post:
      summary: Create app store version localization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/appStoreVersionLocalizations/{id}:
    get:
      summary: Get app store version localization by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      summary: Update app store version localization
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string

  responses:
    SuccessResponse:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        request_id:
          type: string
          example: 8f70cbfcbe5fd237
        data:
          type: object
          additionalProperties: true
      required: [success, request_id, data]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        request_id:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              nullable: true
              additionalProperties: true
          required: [code, message]
      required: [success, request_id, error]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
